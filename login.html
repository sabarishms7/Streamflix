<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Login - StreamFlix</title>

    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="login-container">

    <div class="logo">STREAMFLIX</div>

    <h2>Login</h2>

    

    <form id="loginForm">

        <input type="email"
               id="email"
               placeholder="Email Address"
               required>

        <input type="password"
               id="password"
               placeholder="Password"
               required>

        <button type="submit">
            Login
        </button>

    </form>

    <p>
        New User?
        <a href="register.html">
            Create Account
        </a>
        
    </p>

</div>

<script src="login.js"></script>
    <a href="#" onclick="openAdminPanel()" class="admin-btn">
    ⚙ Company login
</a>
</a>
</body>
</html>
